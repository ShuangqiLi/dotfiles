- defaults:
    link:
      create: true
      relink: true

# Removes *broken* symlinks under $HOME only (see README).
- clean: ['~']

# Create gitignored files from templates before linking (see .gitignore).
- shell:
  - [cp -n gitconfig.local.example gitconfig.local, Ensuring gitconfig.local from template]

- link:
    ~/.vimrc: vimrc
    ~/.vim: vim
    ~/.zshrc: zshrc
    ~/.bashrc:
      path: bashrc
      force: true
    ~/.p10k.zsh: p10k.zsh
    ~/.gitconfig: gitconfig
    ~/.gitconfig.local:
      path: gitconfig.local
      force: true
    ~/.gitignore_global: gitignore_global
    ~/.fonts: fonts
    ~/.config/Code/User/settings.json:
      path: vscode/settings.json
      create: true
    ~/.config/Code/User/keybindings.json:
      path: vscode/keybindings.json
      create: true

- shell:
  # Quote whole commands: YAML flow `[...]` must not see raw `{` / `[` from bash (parse errors).
  - ["bash -c 'rm -f \"${XDG_CACHE_HOME:-$HOME/.cache}\"/p10k-instant-prompt-*.zsh'", "Clearing Powerlevel10k instant-prompt cache (regenerates on next zsh)"]
  - [mkdir -p ~/.cache/vim/swap ~/.cache/vim/backup ~/.cache/vim/undo ~/.cache/vim/plugged, Creating Vim cache directories]
  - ["bash -c 'if [[ -n \"${SKIP_MESLO_FONTS:-}\" ]]; then echo \"SKIP_MESLO_FONTS=1: skipping Meslo font check\"; else exec bash scripts/install-meslo-fonts.sh; fi'", "Verifying MesloLGS NF fonts (vendored under fonts/)"]
  - [fc-cache -f ~/.fonts, Rebuilding font cache]
  - [vim -E -s -u ~/.vimrc -c "PlugInstall --sync" -c "qa", Installing Vim plugins with vim-plug]
  - [bash scripts/install-vscode-extensions.sh, Installing pinned VS Code extensions]
